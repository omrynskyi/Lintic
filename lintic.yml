agent:
  #provider: cerebras
  #api_key: ${LINTIC_API_KEY}
  #model: qwen-3-235b-a22b-instruct-2507
  # For local OpenAI-compatible models, use:
  provider: local-openai
  model: google/gemma-4-26b-a4b
  base_url: http://127.0.0.1:1234/v1
  api_key: local-dev

constraints:
  max_session_tokens: 50000
  max_message_tokens: 4000
  context_window: 32000
  max_interactions: 30
  time_limit_minutes: 60

prompts:
  - id: dev
    title: Dev Testing Session
    description: "Welcome to your development testing session. Use this environment to verify tool execution, UI interactions, and agent performance."

  - id: library-api
    title: Library Catalog API
    difficulty: medium
    tags: [backend, api-design, nodejs]
    description: |
      # Goal
      Build a RESTful API for a small library catalog system.

      ## Requirements
      1. **Books Management**:
         - List all books
         - Search books by title or author
         - Add a new book (title, author, ISBN, published year)

      2. **Borrowing System**:
         - Track which books are currently borrowed
         - Endpoint to 'borrow' a book (marks it as unavailable)
         - Endpoint to 'return' a book (marks it as available)

      ## Constraints
      - Use **Node.js** with any minimal framework (Express, Fastify, etc.)
      - Store data in-memory or using a simple file-based SQLite database
      - Implement basic error handling for missing books or double-borrowing

      ## Deliverables
      - A working server on port 3000
      - A README.md explaining how to test the endpoints
    acceptance_criteria:
      - "All 5 endpoints are implemented: list books, search books, add book, borrow book, and return book"
      - "The server starts successfully on port 3000 and responds to requests"
      - "Double-borrow protection is in place — attempting to borrow an already-borrowed book returns an appropriate error"
      - "A README.md is present with instructions for testing the API endpoints"
    rubric:
      - question: "Did the candidate explicitly choose an HTTP framework (e.g. Express, Fastify, Hono) and communicate that decision to the agent before writing code?"
      - question: "Did the candidate design the book data structure or schema (fields, types) before asking the agent to implement endpoints?"
      - question: "Did the candidate test at least one API endpoint (e.g. via curl or a test script) and verify the response before moving on?"

evaluation:
  provider: local-openai
  model: google/gemma-4-26b-a4b
  base_url: http://127.0.0.1:1234/v1
  api_key: local-dev

api:
  admin_key: ${LINTIC_ADMIN_KEY}
  secret_key: ${LINTIC_SECRET_KEY}
