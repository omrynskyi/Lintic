name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For general questions, please open a [discussion](https://github.com/omrynskyi/Lintic/discussions) instead.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent adapter
        - Prompt pack
        - Infrastructure mock plugin
        - Core (session management, constraints)
        - Frontend (Monaco editor, chat panel)
        - Review dashboard
        - CLI
        - Config (lintic.yml)
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
