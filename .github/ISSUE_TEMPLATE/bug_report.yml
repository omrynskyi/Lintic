name: Bug Report
description: Report a bug in Lintic
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with `npm run dev`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core (session management, constraints)
        - Frontend (Monaco editor, chat panel)
        - Adapters (agent/LLM integration)
        - CLI
        - Infrastructure mocks (WebContainers)
        - Config (lintic.yml)
        - CI / build
        - Other
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.14.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
